<!DOCTYPE html>
<html lang="es" class="bg-gray-200 text-gray-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Tareas Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-60 fixed h-full bg-gradient-to-b from-blue-600 to-blue-700 text-white p-6 shadow-lg">
    <h1 class="text-3xl font-bold mb-10">Tasklist</h1>
    <nav>
      <ul class="space-y-4">
        <li><a href="#" class="font-bold hover:text-blue-200 transition">Inicio</a></li>
        <li><a href="#" class="font-bold hover:text-blue-200 transition">Tareas</a></li>
        <li><a href="#" class="font-bold hover:text-blue-200 transition">Categorías</a></li>
        <li><a href="#" class="font-bold hover:text-blue-200 transition">Ajustes</a></li>
      </ul>
    </nav>
    <button id="toggle-dark" class="mt-6 px-4 py-2 bg-white/20 backdrop-blur rounded hover:bg-white/30 transition">
      Modo Oscuro
    </button>
  </aside>

  <!-- Main -->
  <main class="flex-1 ml-60 p-6">
    <form id="form-tarea" class="flex gap-4 mb-4">
      <input type="text" id="input-tarea" placeholder="Nueva tarea..." class="flex-1 p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm">
      <select id="select-prioridad" class="p-3 rounded-lg border border-gray-300">
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
      <button type="submit" class="px-5 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 hover:scale-105 transition shadow">Añadir</button>
    </form>

    <input type="text" id="buscar-tarea" placeholder="Buscar..." class="w-full p-3 mb-4 rounded border border-gray-300 focus:ring-2 focus:ring-blue-500 shadow-sm">

    <div id="lista-tareas" class="space-y-3"></div>
  </main>

  <!-- Conectar JS -->
  <script src="app.js" defer></script>
</body>
</html>
